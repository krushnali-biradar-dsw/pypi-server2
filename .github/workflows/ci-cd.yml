name: Secure Air-Gapped CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      custom_tag:
        description: 'Custom image tag (e.g., 2.1.3 - leave blank for auto-increment)'
        required: false
        default: ''
      pypi_index_url:
        description: 'Local/Tunnel PyPI Server URL (e.g., ngrok/Tailscale URL or http://host.docker.internal:8080/simple)'
        required: false
        default: 'http://host.docker.internal:8080/simple'

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install sync and obfuscation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor requests

      - name: Cache PyPI local packages (pyrepo)
        id: cache-pyrepo
        uses: actions/cache@v4
        with:
          path: pyrepo
          key: ${{ runner.os }}-pyrepo-${{ hashFiles('component/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pyrepo-

      - name: Run Differential Dependency Sync
        run: |
          python sync_deps.py

      - name: Run Code Obfuscation (Pyarmor)
        run: |
          chmod +x component/build.sh
          ./component/build.sh

      - name: Determine Next Semantic Version
        id: get-version
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
        run: |
          NEXT_VER=$(python get_next_version.py)
          echo "Calculated Next Version: $NEXT_VER"
          echo "version=$NEXT_VER" >> $GITHUB_OUTPUT

      - name: Determine Final Docker Tag
        id: docker-tag
        run: |
          if [ -n "${{ github.event.inputs.custom_tag }}" ]; then
            echo "Using user-specified custom tag: ${{ github.event.inputs.custom_tag }}"
            echo "tag=${{ github.event.inputs.custom_tag }}" >> $GITHUB_OUTPUT
          else
            echo "Using automated semver tag: ${{ steps.get-version.outputs.version }}"
            echo "tag=${{ steps.get-version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.docker-tag.outputs.tag }}
            type=raw,value=latest

      - name: Build and Push Secure Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: component/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PYPI_INDEX_URL=${{ github.event.inputs.pypi_index_url || 'http://host.docker.internal:8080/simple' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Add host.docker.internal mapping so build container can contact host gateway
          add-hosts: |
            host.docker.internal:host-gateway
